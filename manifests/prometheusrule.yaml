apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hermes-agent
  namespace: hermes-agent  # Override via kustomization patch
  labels:
    app: hermes-agent
    # Adjust these labels to match your Prometheus operator selector:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: hermes-agent.rules
      interval: 1m
      rules:
        - alert: HermesAgentDown
          expr: |
            kube_deployment_status_replicas_ready{namespace="hermes-agent", deployment="hermes-agent"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Hermes Agent pod is down"
            description: "Hermes Agent has 0 ready replicas for more than 5 minutes."

        - alert: HermesAgentHighMemory
          expr: |
            (
              container_memory_working_set_bytes{
                namespace="hermes-agent",
                pod=~"hermes-agent-.*",
                container="hermes-agent"
              }
              /
              kube_pod_container_resource_limits{
                namespace="hermes-agent",
                pod=~"hermes-agent-.*",
                container="hermes-agent",
                resource="memory"
              }
            ) > 0.90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Hermes Agent memory usage > 90%"
            description: "Hermes Agent is using more than 90% of its memory limit for 15+ minutes."

        - alert: HermesAgentCrashLoop
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="hermes-agent",
              pod=~"hermes-agent-.*",
              container="hermes-agent"
            }[1h]) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Hermes Agent restarting frequently"
            description: "Hermes Agent has restarted more than 3 times in the last hour."
