apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent  # Override via kustomization patch
  labels:
    app: hermes-agent
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single instance — SQLite state on PVC
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      serviceAccountName: hermes-agent

      # Node affinity disabled by default — pin to a specific node via kustomization patch
      # See overlays/example/patch-node-affinity.yaml

      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        # Copy skills from ConfigMap to PVC so they can be modified at runtime
        - name: init-skills
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/data/hermes/skills/check-homelab-status
              mkdir -p /opt/data/hermes/skills/search-runbooks
              cp /skills-cm/check-homelab-status_skill.yaml /opt/data/hermes/skills/check-homelab-status/skill.yaml
              cp /skills-cm/check-homelab-status_check_status.py /opt/data/hermes/skills/check-homelab-status/check_status.py
              cp /skills-cm/search-runbooks_skill.yaml /opt/data/hermes/skills/search-runbooks/skill.yaml
              cp /skills-cm/search-runbooks_search_runbooks.py /opt/data/hermes/skills/search-runbooks/search_runbooks.py
              echo "Skills initialized successfully"
          volumeMounts:
            - name: skills-cm
              mountPath: /skills-cm
            - name: state
              mountPath: /opt/data
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000

      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:latest
          # Pin to a specific tag for production stability, e.g.:
          # image: nousresearch/hermes-agent:v0.18.2
          imagePullPolicy: IfNotPresent

          # Gateway mode (Discord/Matrix/Telegram) — default for S32
          command: ["hermes", "gateway", "run"]
          # API server mode (OpenAI-compatible endpoint) — enable in a later phase:
          # command: ["hermes", "serve"]

          env:
            - name: HERMES_HOME
              value: /opt/data/hermes
            - name: HERMES_CONFIG
              value: /config/config.yaml
            # Override these in your overlay or via patch:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434  # e.g. http://ollama.ai.svc.cluster.local:11434
            - name: QDRANT_URL
              value: http://qdrant:6333   # e.g. http://qdrant.ai.svc.cluster.local:6333
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: DISCORD_TOKEN
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: DISCORD_ALLOWED_USERS

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 16Gi

          # Process-level liveness (no HTTP endpoint in gateway mode)
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - hermes
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - pgrep
                - -f
                - hermes
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false  # Hermes writes to HERMES_HOME

          volumeMounts:
            - name: state
              mountPath: /opt/data
            - name: config
              mountPath: /config
              readOnly: true

      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: hermes-agent-state
        - name: config
          configMap:
            name: hermes-agent-config
        - name: skills-cm
          configMap:
            name: hermes-agent-skills
