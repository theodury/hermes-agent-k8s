apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  namespace: hermes-agent  # Override via kustomization patch
  labels:
    app: hermes-agent
data:
  config.yaml: |
    # Hermes Agent configuration
    # https://github.com/nousresearch/hermes-agent
    #
    # Endpoints (OLLAMA_BASE_URL, QDRANT_URL) are set via env vars in the Deployment.
    # Override them in your kustomization overlay.

    hermes:
      home: /opt/data/hermes

    llm:
      provider: ollama
      model: hermes3:8b
      # Override model in your overlay patch:
      # model: hermes3:70b  # if you have GPU memory
      # model: hermes3:14b  # good balance quality/speed

    memory:
      provider: qdrant
      collection: hermes-memory
      # Set to 'none' to disable RAG:
      # provider: none

    skills:
      path: /opt/data/hermes/skills

    gateway:
      type: discord
      # Token injected from Secret via env DISCORD_TOKEN
      # Allowed users injected via env DISCORD_ALLOWED_USERS (comma-separated IDs)
      # To use a different gateway type, change to: telegram, matrix, slack

    logging:
      level: info
      # Set to 'debug' for troubleshooting
