# SOPS-encrypted secret — NEVER commit plaintext values
#
# Setup:
#   1. Replace CHANGE_ME values with real credentials
#   2. Encrypt: sops --encrypt --in-place hermes-agent-secrets.sops.yaml
#   3. Commit only the encrypted version
#
# DISCORD_TOKEN:
#   Get from BotFather: /newbot → copy token
#
# DISCORD_ALLOWED_USERS:
#   Your Discord user ID(s), comma-separated
#   Find it: Discord Settings → Advanced → Developer Mode → right-click your avatar → Copy User ID
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent  # Override via kustomization patch
  labels:
    app: hermes-agent
type: Opaque
stringData:
  DISCORD_TOKEN: "CHANGE_ME"
  DISCORD_ALLOWED_USERS: "CHANGE_ME"
