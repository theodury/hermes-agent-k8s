# SOPS-encrypted secret — ENCRYPT BEFORE COMMITTING
# Instructions:
#   1. Replace CHANGE_ME values below with real values
#   2. Run: sops --encrypt --in-place manifests/hermes-agent-secrets.sops.yaml
#   3. Commit only the encrypted version
#
# Get DISCORD_TOKEN from BotFather: /newbot → token
# Get DISCORD_ALLOWED_USERS: your Discord user ID (Settings → Advanced → Developer Mode → right-click your avatar → Copy User ID)
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  namespace: ai
  labels:
    app: hermes-agent
type: Opaque
stringData:
  DISCORD_TOKEN: "CHANGE_ME"
  DISCORD_ALLOWED_USERS: "CHANGE_ME"  # comma-separated Discord user IDs
