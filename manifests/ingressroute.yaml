# IngressRoute for Traefik — disabled by default (gateway-only mode)
# Enable when switching to API server mode: command: ["hermes", "serve"]
#
# To activate:
#   1. Uncomment the IngressRoute below
#   2. Replace YOUR_HOSTNAME with your actual domain (e.g. hermes.lab.example.com)
#   3. Replace YOUR_TLS_SECRET with your TLS secret name (e.g. wildcard-lab-example-com-tls)
#   4. Choose a middleware: remove the one you don't need
#
# apiVersion: traefik.io/v1alpha1
# kind: IngressRoute
# metadata:
#   name: hermes-agent
#   namespace: hermes-agent
# spec:
#   entryPoints:
#     - websecure
#   routes:
#     - match: Host(`YOUR_HOSTNAME`)
#       kind: Rule
#       services:
#         - name: hermes-agent
#           port: 8642
#       middlewares:
#         # Option A: OIDC forward-auth (recommended if you have Keycloak/Authentik)
#         - name: forward-auth
#           namespace: traefik
#         # Option B: IP whitelist (e.g. Tailscale subnet)
#         # - name: tailscale-whitelist
#         #   namespace: traefik
#   tls:
#     secretName: YOUR_TLS_SECRET
---
# Placeholder so kustomization.yaml does not fail before IngressRoute is enabled
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-ingressroute-placeholder
  namespace: hermes-agent
  labels:
    app: hermes-agent
data:
  status: "IngressRoute disabled — enable when switching to API server mode (hermes serve)"
