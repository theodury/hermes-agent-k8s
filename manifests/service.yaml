# ClusterIP service — only needed if you enable the API server (hermes serve)
# In gateway-only mode (S32), this service is created but not used
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: ai
  labels:
    app: hermes-agent
spec:
  type: ClusterIP
  selector:
    app: hermes-agent
  ports:
    - name: api
      port: 8642
      targetPort: 8642
      protocol: TCP
