apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: hermes-agent  # Override via kustomization patch
  labels:
    app: hermes-agent
spec:
  type: ClusterIP
  selector:
    app: hermes-agent
  ports:
    - name: api
      port: 8642
      targetPort: 8642
      protocol: TCP
# Note: this Service is only used when running in API server mode (hermes serve).
# In gateway-only mode (default), the pod does not expose an HTTP port.
